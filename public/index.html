<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salesforce 길잡이 — 입문자 가이드 챗봇</title>
    <style>
      :root {
        --sf-blue: #00a1e0;
        --sf-blue-dark: #0085bd;
        --sf-navy: #032d60;
        --sf-bg: #f3f6f9;
        --sf-gray: #e5e9ee;
        --sf-text: #16325c;
        --bubble-size: 64px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Salesforce Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", "Apple SD Gothic Neo",
          "Malgun Gothic", sans-serif;
        background: var(--sf-bg);
        color: var(--sf-text);
      }

      /* 데모용 랜딩 배경 (위젯은 어떤 페이지에든 얹을 수 있음) */
      .landing {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 24px;
      }
      .landing .cloud {
        font-size: 56px;
      }
      .landing h1 {
        color: var(--sf-navy);
        font-size: 28px;
        margin: 12px 0 8px;
      }
      .landing p {
        color: #5c6b82;
        max-width: 520px;
        line-height: 1.6;
      }
      .landing .hint {
        margin-top: 18px;
        font-size: 14px;
        color: var(--sf-blue-dark);
      }

      /* ===== 채팅 버블(작은 기본 상태) ===== */
      .chat-bubble {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: var(--bubble-size);
        height: var(--bubble-size);
        border-radius: 50%;
        background: var(--sf-blue);
        border: none;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(0, 161, 224, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }
      .chat-bubble:hover {
        transform: scale(1.06);
        box-shadow: 0 8px 22px rgba(0, 161, 224, 0.55);
      }
      .chat-bubble svg {
        width: 30px;
        height: 30px;
        fill: #fff;
      }
      .chat-bubble.hidden {
        opacity: 0;
        transform: scale(0.5);
        pointer-events: none;
      }

      /* ===== 채팅 패널(펼친 큰 상태) ===== */
      .chat-panel {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 380px;
        height: 580px;
        max-height: calc(100vh - 48px);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(3, 45, 96, 0.28);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 1001;
        transform-origin: bottom right;
        transform: scale(0.2);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 0.2s ease;
      }
      .chat-panel.open {
        transform: scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      /* 헤더 */
      .chat-header {
        background: linear-gradient(135deg, var(--sf-blue), var(--sf-blue-dark));
        color: #fff;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .chat-header .logo {
        width: 34px;
        height: 34px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .chat-header .logo svg {
        width: 22px;
        height: 22px;
        fill: #fff;
      }
      .chat-header .title {
        flex: 1;
        line-height: 1.2;
      }
      .chat-header .title strong {
        display: block;
        font-size: 15px;
      }
      .chat-header .title span {
        font-size: 12px;
        opacity: 0.85;
      }
      .chat-header .actions {
        display: flex;
        gap: 4px;
      }
      .chat-header button {
        background: transparent;
        border: none;
        color: #fff;
        width: 30px;
        height: 30px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }
      .chat-header button:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* 메시지 영역 */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        background: var(--sf-bg);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 82%;
        padding: 10px 13px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.bot {
        align-self: flex-start;
        background: #fff;
        border: 1px solid var(--sf-gray);
        border-bottom-left-radius: 4px;
        color: var(--sf-text);
      }
      .msg.user {
        align-self: flex-end;
        background: var(--sf-blue);
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      /* 예시 질문 칩 */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 2px;
      }
      .chip {
        background: #fff;
        border: 1px solid var(--sf-blue);
        color: var(--sf-blue-dark);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12.5px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .chip:hover {
        background: var(--sf-blue);
        color: #fff;
      }

      /* 타이핑 표시 */
      .typing {
        align-self: flex-start;
        display: flex;
        gap: 4px;
        padding: 12px 14px;
        background: #fff;
        border: 1px solid var(--sf-gray);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
      }
      .typing span {
        width: 7px;
        height: 7px;
        background: var(--sf-blue);
        border-radius: 50%;
        animation: blink 1.2s infinite both;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        40% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }

      /* 입력 영역 */
      .chat-input {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--sf-gray);
        background: #fff;
      }
      .chat-input textarea {
        flex: 1;
        resize: none;
        border: 1px solid var(--sf-gray);
        border-radius: 10px;
        padding: 10px 12px;
        font-family: inherit;
        font-size: 14px;
        max-height: 100px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .chat-input textarea:focus {
        border-color: var(--sf-blue);
        box-shadow: 0 0 0 3px rgba(0, 161, 224, 0.18);
      }
      .chat-input button {
        background: var(--sf-blue);
        border: none;
        color: #fff;
        width: 44px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
        flex-shrink: 0;
      }
      .chat-input button:hover:not(:disabled) {
        background: var(--sf-blue-dark);
      }
      .chat-input button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .chat-input button svg {
        width: 20px;
        height: 20px;
        fill: #fff;
      }

      /* 모바일 반응형: 펼치면 화면을 거의 채움 */
      @media (max-width: 480px) {
        .chat-panel {
          right: 0;
          bottom: 0;
          width: 100vw;
          height: 100vh;
          max-height: 100vh;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- 데모 랜딩 (실제 임베드 시에는 이 부분 없이 위젯만 얹어도 됨) -->
    <div class="landing">
      <div class="cloud">☁️</div>
      <h1>Salesforce 길잡이</h1>
      <p>
        Salesforce 생태계에 처음 오셨나요? 어드민 · 개발자 · 컨설턴트 · 슈퍼유저로
        가는 길을 친절하게 안내해 드릴게요. 오른쪽 아래 채팅 버튼을 눌러 시작하세요.
      </p>
      <div class="hint">→ 우측 하단의 채팅 버튼을 클릭하세요</div>
    </div>

    <!-- 작은 기본 상태: 채팅 버블 -->
    <button class="chat-bubble" id="bubble" aria-label="챗봇 열기">
      <svg viewBox="0 0 24 24">
        <path
          d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM7 9h10v2H7V9zm6 5H7v-2h6v2zm4-6H7V6h10v2z"
        />
      </svg>
    </button>

    <!-- 펼친 상태: 채팅 패널 -->
    <div class="chat-panel" id="panel" role="dialog" aria-label="Salesforce 길잡이 챗봇">
      <div class="chat-header">
        <div class="logo">
          <svg viewBox="0 0 24 24">
            <path
              d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"
            />
          </svg>
        </div>
        <div class="title">
          <strong>Salesforce 길잡이</strong>
          <span>입문자 가이드 · AI 챗봇</span>
        </div>
        <div class="actions">
          <button id="minimize" title="최소화" aria-label="최소화">─</button>
          <button id="close" title="닫기" aria-label="닫기">×</button>
        </div>
      </div>

      <div class="chat-messages" id="messages"></div>

      <div class="chat-input">
        <textarea
          id="input"
          rows="1"
          placeholder="궁금한 점을 입력하세요…"
        ></textarea>
        <button id="send" aria-label="전송">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" /></svg>
        </button>
      </div>
    </div>

    <script>
      const bubble = document.getElementById("bubble");
      const panel = document.getElementById("panel");
      const minimizeBtn = document.getElementById("minimize");
      const closeBtn = document.getElementById("close");
      const messagesEl = document.getElementById("messages");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      // 대화 히스토리 (서버로 전송됨). role: 'user' | 'model'
      const history = [];
      let started = false;
      let waiting = false;

      const EXAMPLES = [
        "Salesforce 어드민이 뭐예요?",
        "개발자가 되려면 뭐부터 배워야 하나요?",
        "컨설턴트 자격증 종류가 궁금해요",
        "슈퍼유저는 무슨 일을 하나요?",
      ];

      function openPanel() {
        panel.classList.add("open");
        bubble.classList.add("hidden");
        if (!started) {
          started = true;
          showWelcome();
        }
        setTimeout(() => input.focus(), 250);
      }
      function closePanel() {
        panel.classList.remove("open");
        bubble.classList.remove("hidden");
      }

      bubble.addEventListener("click", openPanel);
      minimizeBtn.addEventListener("click", closePanel);
      closeBtn.addEventListener("click", closePanel);

      function addMessage(text, who) {
        const el = document.createElement("div");
        el.className = "msg " + who;
        el.textContent = text;
        messagesEl.appendChild(el);
        scrollToBottom();
        return el;
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function showWelcome() {
        addMessage(
          "안녕하세요! 저는 Salesforce 입문자를 돕는 '길잡이'예요 ☁️\n" +
            "어드민·개발자·컨설턴트·슈퍼유저, 어떤 길이 궁금하신가요? 아래 예시를 눌러보거나 자유롭게 질문해 주세요!",
          "bot"
        );
        const chips = document.createElement("div");
        chips.className = "chips";
        EXAMPLES.forEach((q) => {
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.textContent = q;
          chip.addEventListener("click", () => {
            if (waiting) return;
            send(q);
          });
          chips.appendChild(chip);
        });
        messagesEl.appendChild(chips);
        scrollToBottom();
      }

      function showTyping() {
        const el = document.createElement("div");
        el.className = "typing";
        el.id = "typing";
        el.innerHTML = "<span></span><span></span><span></span>";
        messagesEl.appendChild(el);
        scrollToBottom();
        return el;
      }
      function hideTyping() {
        const el = document.getElementById("typing");
        if (el) el.remove();
      }

      async function send(text) {
        const trimmed = (text ?? input.value).trim();
        if (!trimmed || waiting) return;

        // 예시 칩 제거 (첫 입력 후)
        const chips = messagesEl.querySelector(".chips");
        if (chips) chips.remove();

        addMessage(trimmed, "user");
        history.push({ role: "user", text: trimmed });
        input.value = "";
        autoGrow();

        waiting = true;
        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });
          const data = await res.json();
          hideTyping();

          if (!res.ok) {
            addMessage(
              "⚠️ " + (data.error || "오류가 발생했습니다. 잠시 후 다시 시도해 주세요."),
              "bot"
            );
          } else {
            addMessage(data.reply, "bot");
            history.push({ role: "model", text: data.reply });
          }
        } catch (err) {
          hideTyping();
          addMessage(
            "⚠️ 서버에 연결하지 못했습니다. 네트워크를 확인하고 다시 시도해 주세요.",
            "bot"
          );
        } finally {
          waiting = false;
          sendBtn.disabled = false;
          input.focus();
        }
      }

      function autoGrow() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 100) + "px";
      }

      sendBtn.addEventListener("click", () => send());
      input.addEventListener("input", autoGrow);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
    </script>
  </body>
</html>
