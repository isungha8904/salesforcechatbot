<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salesforce 길잡이 — 입문자 가이드 챗봇</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Salesforce Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", "Apple SD Gothic Neo",
          "Malgun Gothic", sans-serif;
        background: #f3f6f9;
        color: #16325c;
      }
      .landing {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 24px;
      }
      .landing .cloud {
        font-size: 56px;
      }
      .landing h1 {
        color: #032d60;
        font-size: 28px;
        margin: 12px 0 8px;
      }
      .landing p {
        color: #5c6b82;
        max-width: 520px;
        line-height: 1.6;
      }
      .landing .hint {
        margin-top: 18px;
        font-size: 14px;
        color: #0085bd;
      }
    </style>
  </head>
  <body>
    <!-- 데모 랜딩 페이지. 실제로는 이 페이지가 없어도 widget.js만 있으면 위젯이 뜬다. -->
    <div class="landing">
      <div class="cloud">☁️</div>
      <h1>Salesforce 길잡이</h1>
      <p>
        Salesforce 생태계에 처음 오셨나요? 어드민 · 개발자 · 컨설턴트 · 슈퍼유저로
        가는 길을 친절하게 안내해 드릴게요. 오른쪽 아래 채팅 버튼을 눌러 시작하세요.
      </p>
      <div class="hint">→ 우측 하단의 채팅 버튼을 클릭하세요</div>
    </div>

    <!-- 챗봇 위젯: 이 한 줄이 어떤 HTML 페이지에든 들어가면 위젯이 나타난다. -->
    <script src="/widget.js" defer></script>
  </body>
</html>
